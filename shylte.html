<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 20px;
            background-color: rgb(76, 27, 121);
        }
        .outer-block {
            background-color: rgb(199, 193, 193);
            min-width: 320px;
            min-height: 320px;
            box-sizing: border-box;
            width: 394px;
            height: 420px;
            border-radius: 10px;
            box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.61);
            padding: 20px;
        }
        .inner-block {
            background-color:rgb(43, 24, 61);
            border-radius: 10px;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            padding: 6px;
            display: flex;
            justify-content: flex-start;
            align-content: flex-start;
            flex-wrap: wrap;
        }

        .block {
            width: 20px;
            height: 20px;
            box-sizing: border-box;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            margin: 4px;
            border-radius: 6px; 
            background-color: rgb(33, 21, 44);
            border-bottom: 6px solid rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
        }
        .block:active {
            transform: translate(0 1px, 4px);
            border-width: 0;
        }

        .purple {
            background-color: purple;
        }
        .red {
            background-color: rgb(179, 37, 37);
        }
        .green {
            background-color: rgb(37, 179, 37);
        }
    </style>
</head>
<body>
    <div class="outer-block">
        <div class="inner-block">
            <div class="block purple">1</div>
            <div class="block red">2</div>
            <div class="block purple">3</div>
            <div class="block green">4</div>
        </div>
    </div>
</body>
</html>
